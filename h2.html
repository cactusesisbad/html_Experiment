<!DOCTYPE html>
<html>
	<head>
		<meta 
			charset="utf-8">
			<title> Welcome </title>		
			<link rel="stylesheet" href="c2.css">
			<link rel="icon" type="image/png"href="thumbnail.png" >
		<script src="j2.js" defer></script>
	</head>
	<body class="black">
		<span class="top_bar_menu">
			<button onclick="ChangeColor()"><img src="bright.jpg" height=20 width=20></button>
			project_1
		</span>
		<hr/>
			<div class="game">
				<div id="status">Wanna Play<strong><i>?</i></strong></div>
				<hr/>
				<p id="score">Score:1</p>
				<p id="bombstxt">bombs:0</p>

				<div class="mindfield">
					<input class="minds" type="checkbox" id="checkbox1"onclick="checkmines(0,id)"  data-startup=true disabled=true/>
					<input class="minds" type="checkbox" id="checkbox2"onclick="checkmines(1,id)"  data-startup=true disabled=true/>
					<input class="minds" type="checkbox" id="checkbox3"onclick="checkmines(2,id)"  data-startup=true disabled=true/>
					<input class="minds" type="checkbox" id="checkbox4"onclick="checkmines(3,id)"  data-startup=true disabled=true/>
					<input class="minds" type="checkbox" id="checkbox5"onclick="checkmines(4,id)"  data-startup=true disabled=true/>
					<input class="minds" type="checkbox" id="checkbox6"onclick="checkmines(5,id)"  data-startup=true disabled=true/>
					<input class="minds" type="checkbox" id="checkbox7"onclick="checkmines(6,id)"  data-startup=true disabled=true/>
					<input class="minds" type="checkbox" id="checkbox8"onclick="checkmines(7,id)"  data-startup=true disabled=true/>
					<input class="minds" type="checkbox" id="checkbox9"onclick="checkmines(8,id)"  data-startup=true disabled=true/>
				</div>

				<div> <button class="startbtn" id="startbtn" onclick="startmines(true)">Let's Play<i><b>!</b></i></button></div>

				<div class="dif_btn_manager" data-started="true">
					<div class="bet">

						<label class="lbett" for="bet">bet amount:5</label>
						<div class="bett">
							<input class="bettt" type="range" id="bet" name="bet"min="1" max="10" /> 
						</div>
					</div>
					<div class="difficulty_buttons">
						<button class="difficulty_button" id="easy" onclick="changedif(id,1)" >easy </br> difficulty</button>
						<button class="difficulty_button" id="med" onclick="changedif(id,2)" >medium</br> difficulty</button>
						<button class="difficulty_button" id="hard" onclick="changedif(id,3)" >hard</br> difficulty</button>
					 </div>
				</div>

			</div>
			
	</body>
	
</html>
